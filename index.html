<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scintigrami - kartice za vežbanje</title>
<style>
  :root{
    --bg:#eef1f5;
    --card:#ffffff;
    --ink:#1b2430;
    --muted:#6b7785;
    --accent:#2f6df6;
    --accent-soft:#e8f0ff;
    --line:#e3e8ef;
    --good:#16a34a;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    line-height:1.45;
  }
  .wrap{max-width:760px;margin:0 auto;padding:16px 16px 40px;}

  header{text-align:center;margin:10px 0 14px;}
  header h1{font-size:20px;margin:0 0 2px;font-weight:700;}
  header p{margin:0;color:var(--muted);font-size:13px;}

  .bar{
    display:flex;align-items:center;justify-content:space-between;
    gap:10px;margin:14px 0;
  }
  .counter{font-size:14px;color:var(--muted);font-variant-numeric:tabular-nums;}
  .progress{flex:1;height:6px;background:var(--line);border-radius:99px;overflow:hidden;}
  .progress > i{display:block;height:100%;background:var(--accent);width:0;transition:width .25s ease;}

  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:18px;
    box-shadow:0 8px 28px rgba(27,36,48,.08);
    overflow:hidden;
  }
  .stage{
    position:relative;
    background:#f6f8fb;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    user-select:none;
    min-height:240px;
    padding:10px;
  }
  .stage img{
    max-width:100%;
    max-height:54vh;
    border-radius:8px;
    display:block;
  }
  .tap-hint{
    position:absolute;left:0;right:0;bottom:10px;
    text-align:center;font-size:13px;color:var(--muted);
    pointer-events:none;
  }
  .tap-hint span{
    background:rgba(255,255,255,.9);
    border:1px solid var(--line);
    padding:6px 14px;border-radius:99px;
    box-shadow:0 2px 8px rgba(27,36,48,.06);
  }

  .answer{
    border-top:1px solid var(--line);
    padding:6px 16px 14px;
    display:none;
    animation:fade .25s ease;
  }
  .answer.show{display:block;}
  @keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}

  .row{padding:11px 2px;border-bottom:1px solid var(--line);}
  .row:last-child{border-bottom:none;}
  .row .lab{
    font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
    color:var(--accent);margin-bottom:3px;display:flex;align-items:center;gap:7px;
  }
  .row .lab b{
    background:var(--accent-soft);color:var(--accent);
    width:20px;height:20px;border-radius:50%;
    display:inline-flex;align-items:center;justify-content:center;
    font-size:11px;flex:none;
  }
  .row .val{font-size:15.5px;color:var(--ink);}

  .controls{display:flex;gap:10px;margin-top:16px;}
  button{
    font:inherit;cursor:pointer;border-radius:12px;border:1px solid var(--line);
    background:var(--card);color:var(--ink);padding:13px 14px;flex:1;
    font-weight:600;font-size:15px;transition:background .12s,transform .04s;
  }
  button:hover{background:#f3f6fb;}
  button:active{transform:scale(.98);}
  button.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
  button.primary:hover{background:#2a62db;}
  button:disabled{opacity:.4;cursor:default;}

  .tools{display:flex;gap:10px;margin-top:10px;}
  .tools button{flex:1;font-weight:500;font-size:14px;padding:11px;}

  footer{text-align:center;color:var(--muted);font-size:12px;margin-top:22px;line-height:1.6;}
  kbd{background:#fff;border:1px solid var(--line);border-bottom-width:2px;border-radius:5px;
      padding:1px 6px;font-size:11px;font-family:inherit;}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>🩻 Scintigrami - kartice</h1>
    <p>Pogledaj scintigram, opiši ga u sebi, pa tapni za odgovor</p>
  </header>

  <div class="bar">
    <span class="counter" id="counter">1 / 32</span>
    <div class="progress"><i id="progressBar"></i></div>
  </div>

  <div class="card">
    <div class="stage" id="stage">
      <img id="cardImg" src="" alt="scintigram">
      <div class="tap-hint" id="tapHint"><span>👆 Tapni za odgovor</span></div>
    </div>
    <div class="answer" id="answer">
      <div class="row"><div class="lab"><b>1</b>Naziv scintigrama</div><div class="val" id="fNaziv"></div></div>
      <div class="row"><div class="lab"><b>2</b>Radiofarmak</div><div class="val" id="fRadio"></div></div>
      <div class="row"><div class="lab"><b>3</b>Mehanizam nakupljanja</div><div class="val" id="fMeh"></div></div>
      <div class="row"><div class="lab"><b>4</b>Nalaz na scintigramu</div><div class="val" id="fNalaz"></div></div>
    </div>
  </div>

  <div class="controls">
    <button id="prevBtn">← Prethodna</button>
    <button id="flipBtn" class="primary">Prikaži odgovor</button>
    <button id="nextBtn">Sledeća →</button>
  </div>

  <div class="tools">
    <button id="shuffleBtn">🔀 Promešaj</button>
    <button id="orderBtn">↩︎ Redom</button>
  </div>

  <footer>
    32 kartice iz materijala za praktični deo ispita.<br>
    Tasteri: <kbd>razmak</kbd> odgovor &nbsp; <kbd>←</kbd> <kbd>→</kbd> kretanje &nbsp; <kbd>S</kbd> promešaj
  </footer>

</div>

<script src="data.js"></script>
<script>
  let order = CARDS.map((_, i) => i);
  let pos = 0;
  let revealed = false;

  const el = id => document.getElementById(id);
  const img = el('cardImg'), answer = el('answer'), tapHint = el('tapHint');

  function render(){
    const c = CARDS[order[pos]];
    revealed = false;
    answer.classList.remove('show');
    tapHint.style.display = '';
    el('flipBtn').textContent = 'Prikaži odgovor';

    // load image, then fill text (avoids flashing old image)
    img.src = c.img;
    el('fNaziv').textContent = c.naziv;
    el('fRadio').textContent = c.radiofarmak;
    el('fMeh').textContent   = c.mehanizam;
    el('fNalaz').textContent = c.nalaz;

    el('counter').textContent = (pos + 1) + ' / ' + CARDS.length;
    el('progressBar').style.width = ((pos + 1) / CARDS.length * 100) + '%';
    el('prevBtn').disabled = pos === 0;
    el('nextBtn').disabled = pos === CARDS.length - 1;
    window.scrollTo({top:0, behavior:'smooth'});
  }

  function flip(){
    revealed = !revealed;
    answer.classList.toggle('show', revealed);
    tapHint.style.display = revealed ? 'none' : '';
    el('flipBtn').textContent = revealed ? 'Sakrij odgovor' : 'Prikaži odgovor';
  }
  function next(){ if(pos < CARDS.length - 1){ pos++; render(); } }
  function prev(){ if(pos > 0){ pos--; render(); } }

  function shuffle(){
    for(let i = order.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [order[i], order[j]] = [order[j], order[i]];
    }
    pos = 0; render();
  }
  function ordered(){
    order = CARDS.map((_, i) => i);
    pos = 0; render();
  }

  el('stage').addEventListener('click', flip);
  el('flipBtn').addEventListener('click', flip);
  el('nextBtn').addEventListener('click', next);
  el('prevBtn').addEventListener('click', prev);
  el('shuffleBtn').addEventListener('click', shuffle);
  el('orderBtn').addEventListener('click', ordered);

  document.addEventListener('keydown', e => {
    if(e.code === 'Space' || e.code === 'Enter'){ e.preventDefault(); flip(); }
    else if(e.code === 'ArrowRight'){ next(); }
    else if(e.code === 'ArrowLeft'){ prev(); }
    else if(e.key === 's' || e.key === 'S'){ shuffle(); }
  });

  render();
</script>
</body>
</html>
